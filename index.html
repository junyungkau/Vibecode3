<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딸깍 이미지 공방 — 행사 배너 만들기</title>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  @font-face{
    font-family:'Moneygraphy-Rounded';
    src:url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Toss/Moneygraphy-Rounded.woff2') format('woff2');
    font-display:swap;
  }
  :root{
    --paper:#eef1f7; --ink:#141a2e; --cobalt:#2f5bff; --bubble:#fff;
    --spark:#ffd44d; --muted:rgba(20,26,46,0.55);
    --display:'Moneygraphy-Rounded','Do Hyeon',sans-serif;
    --body:'Pretendard',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{ box-sizing:border-box; margin:0; }
  body{
    background: radial-gradient(ellipse 70% 40% at 50% -5%, rgba(47,91,255,0.10), transparent 65%), var(--paper);
    color:var(--ink); font-family:var(--body); line-height:1.6; min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important; } }
  .wrap{ max-width:640px; margin:0 auto; padding:56px 20px 80px; }
  .eyebrow{ font-family:var(--mono); font-size:0.75rem; font-weight:700; letter-spacing:0.14em; color:var(--cobalt); }
  h1{ font-family:var(--display); font-size:clamp(2rem,7vw,2.8rem); margin:10px 0 6px; }
  h1 .hl{ background:linear-gradient(transparent 58%, var(--spark) 58%); padding:0 4px; }
  .sub{ color:var(--muted); font-size:0.95rem; margin-bottom:36px; }
  label{ display:block; font-family:var(--mono); font-size:0.72rem; font-weight:700; letter-spacing:0.12em; color:var(--cobalt); margin-bottom:8px; }
  textarea, select{
    width:100%; background:var(--bubble); border:2.5px solid var(--ink); border-radius:14px;
    font-family:var(--body); font-size:1rem; color:var(--ink); padding:14px 16px;
  }
  textarea{ min-height:80px; resize:vertical; }
  textarea:focus, select:focus{ outline:3px solid rgba(47,91,255,0.35); outline-offset:2px; }
  .field{ margin-bottom:18px; }
  .row{ display:flex; gap:14px; }
  .row .field{ flex:1; }
  .btn{
    width:100%; background:var(--cobalt); color:#fff; border:2.5px solid var(--ink); border-radius:999px;
    font-family:var(--display); font-size:1.25rem; padding:16px; cursor:pointer; margin-top:4px;
    box-shadow:5px 6px 0 var(--ink); transition:transform .12s, box-shadow .12s;
  }
  .btn:hover{ transform:translate(-2px,-2px); box-shadow:7px 8px 0 var(--ink); }
  .btn:active{ transform:translate(0,0); box-shadow:3px 4px 0 var(--ink); }
  .btn:disabled{ opacity:.55; cursor:progress; }

  #result{ margin-top:32px; }
  .imgcard{
    background:var(--bubble); border:2.5px solid var(--ink); border-radius:18px;
    box-shadow:6px 8px 0 var(--ink); padding:18px; animation:pop .4s ease;
  }
  @keyframes pop{ from{ opacity:0; transform:translateY(8px);} }
  .imgcard img{ width:100%; border-radius:10px; display:block; background:var(--paper); }
  .actions{ display:flex; gap:10px; margin-top:16px; }
  .actions a, .actions button{
    flex:1; text-align:center; text-decoration:none;
    background:var(--paper); border:2px solid var(--ink); border-radius:999px;
    font-family:var(--mono); font-size:0.8rem; font-weight:700; padding:11px 0; cursor:pointer; color:var(--ink);
  }
  .actions .primary{ background:var(--spark); }
  .error{ background:#fff; border:2.5px solid var(--cobalt); border-radius:14px; padding:16px 18px; font-size:0.9rem; }
  .loading{ text-align:center; padding:40px 0; }
  .loading .spin{
    width:44px; height:44px; margin:0 auto 16px; border-radius:50%;
    border:5px solid rgba(47,91,255,0.2); border-top-color:var(--cobalt);
    animation:rot .8s linear infinite;
  }
  @keyframes rot{ to{ transform:rotate(360deg); } }
  .loading p{ font-family:var(--mono); font-size:0.85rem; color:var(--muted); }
  .hint{ font-size:0.82rem; color:var(--muted); margin-top:8px; }
  footer{ margin-top:56px; text-align:center; font-family:var(--mono); font-size:0.72rem; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">DDALKKAK UNION · DEMO 03</div>
  <h1>딸깍 <span class="hl">이미지 공방</span></h1>
  <p class="sub">행사 배너, 발표자료 표지, SNS 썸네일 — 뭘 그릴지 한국어로 적으면 딸깍 만들어드립니다.</p>

  <div class="field">
    <label for="keyword">무엇을 그릴까요?</label>
    <textarea id="keyword" maxlength="200" placeholder="예: 가을 대학 축제 무대, 반짝이는 조명과 단풍"></textarea>
    <p class="hint">글자는 넣지 않고 배경/그림만 생성합니다. 제목 텍스트는 나중에 캔바·PPT로 올리면 됩니다.</p>
  </div>
  <div class="row">
    <div class="field">
      <label for="style">스타일</label>
      <select id="style">
        <option value="clean modern flat poster design, bold geometric shapes, professional, high contrast">깔끔한 포스터</option>
        <option value="warm cozy hand-drawn illustration, soft pastel colors, friendly, storybook style">따뜻한 일러스트</option>
        <option value="retro vintage aesthetic, 80s 90s style, grainy texture, nostalgic color palette">레트로 감성</option>
        <option value="minimalist banner, lots of negative space, single focal element, muted tones, elegant">미니멀 배너</option>
        <option value="vibrant pop art style, bright saturated colors, energetic, playful, bold outlines">팝아트 활기</option>
      </select>
    </div>
    <div class="field">
      <label for="ratio">비율</label>
      <select id="ratio">
        <option value="1024x1024">정사각형 (인스타)</option>
        <option value="1280x720">가로 (배너/썸네일)</option>
        <option value="720x1280">세로 (포스터)</option>
      </select>
    </div>
  </div>
  <button class="btn" id="go">이미지 딸깍</button>

  <div id="result"></div>

  <footer>Powered by Pollinations AI (free) · 학교 어디서든 쓰세요</footer>
</div>

<script>
const go = document.getElementById('go');
const resultEl = document.getElementById('result');

// 한국어 키워드를 영어로 살짝 보정하는 접미사 (이미지 모델은 영어에서 안정적)
const NEGATIVE = 'no text, no letters, no words, no watermark';

go.addEventListener('click', () => {
  const keyword = document.getElementById('keyword').value.trim();
  const style = document.getElementById('style').value;
  const ratio = document.getElementById('ratio').value;
  if(!keyword){ resultEl.innerHTML = '<div class="error">무엇을 그릴지 먼저 적어주세요!</div>'; return; }

  const [w, h] = ratio.split('x');
  const seed = Math.floor(Math.random() * 1000000);
  const prompt = `${keyword}, ${style}, ${NEGATIVE}`;

  // Pollinations: URL 자체가 이미지. 서버·키·폴링 전혀 필요 없음.
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`
            + `?width=${w}&height=${h}&seed=${seed}&nologo=true`;

  go.disabled = true; go.textContent = '그리는 중...';
  resultEl.innerHTML = '<div class="loading"><div class="spin"></div><p>붓을 들고 딸깍 그리는 중... (약 10~20초)</p></div>';

  const img = new Image();
  img.onload = () => {
    resultEl.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'imgcard';
    card.appendChild(img);
    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML =
      '<a class="primary" href="'+url+'" download="ddalkkak-image.png" target="_blank">다운로드</a>'
      + '<button id="again">다시 그리기</button>';
    card.appendChild(actions);
    resultEl.appendChild(card);
    document.getElementById('again').addEventListener('click', () => go.click());
    go.disabled = false; go.textContent = '이미지 딸깍';
  };
  img.onerror = () => {
    resultEl.innerHTML = '<div class="error">이미지를 불러오지 못했어요. 잠시 후 다시 시도해주세요.</div>';
    go.disabled = false; go.textContent = '이미지 딸깍';
  };
  img.alt = '생성된 이미지';
  img.src = url;
});
</script>
</body>
</html>
